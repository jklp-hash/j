name: 🌐 4-Browse the Web

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to visit'
        required: true
        type: string

jobs:
  browse:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          

      - name: Setup Node and Puppeteer
        run: |
          npm init -y
          npm install puppeteer

      - name: Create screenshot script
        run: |
          cat > screenshot.js << 'ENDOFSCRIPT'
          const puppeteer = require('puppeteer');
          const url = process.argv[2];
          const outputPath = process.argv[3];

          (async () => {
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 720 });
            
            try {
              await page.goto(url, { waitUntil: 'networkidle2', timeout: 30000 });
              await page.content({ path: outputPath });
              console.log('Screenshot saved successfully');
            } catch (err) {
              console.error('Screenshot error:', err.message);
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          ENDOFSCRIPT

      - name: Visit URL and download media
        run: |
          RAW_URL="${{ github.event.inputs.url }}"
          
          # Normalize URL: try HTTPS first if no protocol given
          if [[ ! "$RAW_URL" =~ ^https?:// ]]; then
            HTTPS_URL="https://$RAW_URL"
            HTTP_URL="http://$RAW_URL"
            
            echo "Trying HTTPS: $HTTPS_URL"
            if curl -L --connect-timeout 10 --max-time 30 -o /dev/null -s -w "%{http_code}" "$HTTPS_URL" | grep -q "200\|301\|302\|303\|307\|308"; then
              URL="$HTTPS_URL"
              echo "HTTPS works, using $URL"
            else
              echo "HTTPS failed, falling back to HTTP"
              URL="$HTTP_URL"
            fi
          else
            URL="$RAW_URL"
          fi
          
          echo "Visiting $URL"

          # Extract domain (remove protocol and optional www)
          DOMAIN=$(echo "$URL" | awk -F/ '{print $3}' | sed 's/^www\.//')
          
          SLUG=$(echo "$URL" | sed 's/[^a-zA-Z0-9]/_/g' | cut -c1-100)
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FOLDER="pages/$DOMAIN/$SLUG/$TIMESTAMP"
          MEDIA_FOLDER="$FOLDER/media"
          mkdir -p "$FOLDER" "$MEDIA_FOLDER"


          # Take screenshot
          echo "Taking screenshot..."
          node screenshot.js "$URL" "$FOLDER/screenshot.html"

          # Base URL for resolving relative links
          BASE_URL="${URL%%/*}"
          BASE_DOMAIN=$(echo "$URL" | awk -F/ '{print $3}')

          while IFS= read -r link; do
            [ -z "$link" ] && continue
            
            if [[ "$link" = /* ]]; then
              ABSOLUTE_URL="${BASE_URL}${link}"
            elif [[ "$link" =~ ^https?:// ]]; then
              ABSOLUTE_URL="$link"
            else
              ABSOLUTE_URL="${BASE_URL}/${link}"
            fi

            ext="${link##*.}"
            ext_lower=$(echo "$ext" | tr '[:upper:]' '[:lower:]')

            if echo "$ext_lower" | grep -Eq "^($MEDIA_EXT)$"; then
              echo "Downloading: $ABSOLUTE_URL"
              FILENAME=$(basename "$link" | sed 's/[?#].*//')
              [ -f "$MEDIA_FOLDER/$FILENAME" ] && FILENAME="$(date +%s)_$FILENAME"
              
              curl -L --retry 2 --max-time 60 -o "$MEDIA_FOLDER/$FILENAME" "$ABSOLUTE_URL" 2>/dev/null && {
                FILE_SIZE=$(stat -c%s "$MEDIA_FOLDER/$FILENAME" 2>/dev/null || echo 0)
            fi

        
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add pages/ browse.md
          if git diff --staged --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "Saved page with media and screenshot [skip ci]"
          git pull --rebase
          git push
