name: the Web

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to visit'
        required: true
        type: string

jobs:
  browse:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Create screenshot script
        run: |
          sudo apt-get update
    

 

      - name: Create screenshot script
        run: |
          {
            echo "# Downloads"
            echo ""
            echo "---"
            echo ""
            echo "## NO FILE DOWNLOADED YET!"
            echo ""
            echo "Use the download workflows to add files here."
            echo ""
            echo "---"
            echo ""
            echo "*This tool created by [avasam.ir](https://avasam.ir)*"
          } > downloads/README.md

          echo "Created downloads/README.md"

          # Stage the new README file
          git add downloads/README.md
          
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          #git add pages/
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          fi
          git commit -m "asd"
          git push
