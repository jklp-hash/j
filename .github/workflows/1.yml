name: proxy

on:
  workflow_dispatch:

jobs:
  browse:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
     # - name: command
        #uses: actions/checkout@v4
      
      - name: command
        run: |
          sudo apt-get update
          sleep 10
          echo starting
          asd=$(hostname -I)
          echo "Ip: $asd"
          
          sudo apt install squid -y
          sudo ufw allow 3128/tcp
          
          sudo systemctl start squid
          sudo systemctl enable squid
          echo 1
          cat /etc/squid/squid.conf | grep http_port
          echo 3
          curl ifconfig.me -o a.txt
          echo "$(tail -n10 a.txt)"

          
          
          
      

          echo 4
          sleep 1000
         
