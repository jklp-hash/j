name: proxy

on:
  workflow_dispatch:

jobs:
  browse:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      
      - name: command
        run: |
          sudo apt-get update
          sleep 10
          echo starting
          
          sudo apt install squid -y
          sudo systemctl start squid
          sudo systemctl enable squid
          echo 1
          cat /etc/squid/squid.conf
          echo 2
          sudo ufw allow 3128/tcp
          echo 3
          asd=$(hostname)
          echo "$asd"
          sleep 1000
